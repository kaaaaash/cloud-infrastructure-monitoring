global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/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'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#incidents'
        send_resolved: true
        icon_emoji: ':fire:'
        title: '{{ .Status | toUpper }} - {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']